<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAWBLADES (ONLINE)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body { 
            margin: 0; 
            background-color: #111; 
            overflow: hidden; 
            font-family: 'Press Start 2P', cursive; 
            color: #f8fafc; 
            user-select: none; 
            -webkit-user-select: none; 
            cursor: default; 
        }
        
        canvas { 
            display: block; 
            image-rendering: pixelated; 
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        .scanlines { 
            position: fixed; 
            inset: 0; 
            pointer-events: none; 
            z-index: 50; 
            opacity: 0.6; 
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); 
            background-size: 100% 4px, 6px 100%; 
        }

        /* --- THE ONLY NEW ADDITION: MENU BACKGROUND --- */
        .menu-bg {
            background: radial-gradient(circle at center, #2e0814 0%, #111 60%);
            background-size: 200% 200%;
            animation: pulseMenu 6s ease-in-out infinite alternate;
        }
        
        @keyframes pulseMenu {
            0% { background-position: center; transform: scale(1); opacity: 0.95; }
            100% { background-position: center; transform: scale(1.05); opacity: 1; }
        }

        /* Basic UI overlays */
        .overlay { 
            position: absolute; 
            inset: 0; 
            z-index: 40; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: rgba(0, 0, 0, 0.7);
        }
        
        .hidden { display: none !important; }
        
        button {
            font-family: 'Press Start 2P', cursive;
            transition: transform 0.1s, filter 0.1s;
        }
        button:active { transform: scale(0.95); }
        button:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

    <div class="scanlines"></div>
    <canvas id="gameCanvas"></canvas>

    <!-- Main Menu Overlay with the new background -->
    <div id="mainMenu" class="overlay menu-bg hidden">
        <h1 class="text-4xl md:text-6xl text-red-600 mb-2 tracking-widest" style="text-shadow: 0 0 15px red;">SAWBLADES</h1>
        <p class="text-gray-400 mb-10 text-xs tracking-widest">ONLINE EDITION</p>
        
        <button onclick="startGame()" class="bg-red-700 text-white px-8 py-4 mb-6 border-4 border-red-900 rounded shadow-[0_0_15px_rgba(255,0,0,0.5)] text-xl">
            PLAY
        </button>
        
        <div class="flex gap-4">
            <button onclick="showSettings()" class="bg-gray-800 text-white px-4 py-2 border-2 border-gray-600 rounded text-xs">SETTINGS</button>
            <button onclick="showLeaderboard()" class="bg-gray-800 text-white px-4 py-2 border-2 border-gray-600 rounded text-xs">LEADERBOARD</button>
        </div>
    </div>

    <!-- UI Placeholder for HUD -->
    <div id="hud" class="hidden absolute top-4 left-4 z-40 flex flex-col gap-2 pointer-events-none">
        <div class="text-yellow-400 text-sm drop-shadow-md">COINS: <span id="coinDisplay">0</span></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height, groundY;
        let stars = [];
        let floatingTexts = [];
        let gameState = 'boot'; 
        
        // Exact original save data structure
        let saveData = { 
            inventory: { skins: ['default'], bgs: ['default'] }, 
            economy: { coins: 0, gumballCount: 0, wheelCount: 0 } 
        };

        // --- GLOBAL FUNCTIONS ---
        window.showMainMenu = function() {
            gameState = 'menu';
            document.getElementById('mainMenu').classList.remove('hidden');
            document.getElementById('hud').classList.add('hidden');
        };

        window.startGame = function() {
            gameState = 'game';
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('coinDisplay').innerText = saveData.economy.coins;
        };

        window.showLeaderboard = function() { alert("Leaderboard placeholder - kept original"); };
        window.showChangelog = function() { alert("Changelog placeholder - kept original"); };
        window.showSettings = function() { alert("Settings placeholder - kept original"); };
        window.wipeSave = function() { 
            saveData = { inventory: { skins: ['default'], bgs: ['default'] }, economy: { coins: 0, gumballCount: 0, wheelCount: 0 } }; 
            alert("Save wiped!"); 
        };
        window.devUnlock = function() { alert("Dev unlock triggered"); };
        window.turnKnob = function() { alert("Gumball machine knob turned"); };

        // --- DRAWING & LOGIC ---
        window.drawGame = function() {
            // Clear screen
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, width, height);

            // Draw Stars
            stars.forEach(s => {
                ctx.fillStyle = s.color;
                ctx.fillRect(s.x, s.y, s.size, s.size);
                
                if (gameState === 'game' || gameState === 'menu') {
                    s.y += 0.2; // slow scroll
                    if (s.y > height) {
                        s.y = 0;
                        s.x = Math.random() * width;
                    }
                }
            });

            // Draw Ground
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, groundY, width, height - groundY);
            ctx.fillStyle = '#ff0044'; // Top line of ground
            ctx.fillRect(0, groundY, width, 4);

            // Draw floating texts
            for(let i = floatingTexts.length - 1; i >= 0; i--) {
                let ft = floatingTexts[i];
                ctx.globalAlpha = Math.max(0, ft.life);
                ctx.fillStyle = ft.color || '#fff';
                ctx.font = '10px "Press Start 2P"';
                ctx.fillText(ft.text, ft.x, ft.y);
                ctx.globalAlpha = 1.0;
            }
        };

        function loop() {
            if (gameState === 'game') {
                // Game logic
                for(let i = floatingTexts.length - 1; i >= 0; i--) {
                    let ft = floatingTexts[i];
                    ft.y -= 1;
                    ft.life -= 0.02; 
                    if (ft.life <= 0) floatingTexts.splice(i, 1); 
                }
            }
            
            window.drawGame();
            requestAnimationFrame(loop);
        }

        // --- INITIALIZATION ---
        window.onload = function() {
            width = window.innerWidth; 
            height = window.innerHeight; 
            canvas.width = width; 
            canvas.height = height; 
            groundY = height - 50;
            
            stars.length = 0; 
            for(let i=0; i<50; i++) {
                stars.push({
                    x: Math.random() * width, 
                    y: Math.random() * height, 
                    size: Math.random() * 2 + 1, 
                    color: `rgba(255,255,255,${Math.random()})`, 
                    blink: Math.random() * 100
                });
            }
            
            // Load logic exactly as requested
            if(!saveData.inventory) saveData.inventory = { skins: ['default'], bgs: ['default'] };
            if(!saveData.economy) saveData.economy = { coins: 0, gumballCount: 0, wheelCount: 0 };
            
            window.showMainMenu(); 
            loop();
        }

        window.addEventListener('resize', () => { 
            width = window.innerWidth; 
            height = window.innerHeight; 
            canvas.width = width; 
            canvas.height = height; 
            groundY = height - 50; 
        });
        
    </script>
</body>
</html>
