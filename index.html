<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAWBLADES (ONLINE)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body { 
            margin: 0; 
            background-color: #050505; 
            overflow: hidden; 
            font-family: 'Press Start 2P', cursive; 
            color: #f8fafc; 
            user-select: none; 
            -webkit-user-select: none; 
            cursor: default; 
            touch-action: none;
        }
        
        canvas { 
            display: block; 
            image-rendering: pixelated; 
        }

        .scanlines { 
            position: fixed; 
            inset: 0; 
            pointer-events: none; 
            z-index: 50; 
            opacity: 0.4; 
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); 
            background-size: 100% 4px, 6px 100%; 
        }
        
        .crt-flicker {
            animation: flicker 0.15s infinite;
            pointer-events: none;
            position: fixed;
            inset: 0;
            z-index: 49;
            background: rgba(255,255,255,0.01);
        }

        @keyframes flicker {
            0% { opacity: 0.9; }
            50% { opacity: 1; }
            100% { opacity: 0.95; }
        }

        /* Custom UI buttons */
        .pixel-btn {
            background-color: #1a1a2e;
            border: 4px solid #4a4e69;
            color: #fff;
            padding: 12px 24px;
            text-transform: uppercase;
            transition: all 0.1s;
            box-shadow: 4px 4px 0px #000;
        }
        .pixel-btn:hover {
            background-color: #e63946;
            border-color: #f1faee;
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #000;
        }
        .pixel-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }

        .text-shadow { text-shadow: 4px 4px 0px #000; }
        .text-glow { text-shadow: 0 0 10px rgba(230, 57, 70, 0.8), 0 0 20px rgba(230, 57, 70, 0.4); }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="scanlines"></div>
    <div class="crt-flicker"></div>

    <!-- UI Overlay Layer -->
    <div id="ui-layer" class="absolute inset-0 pointer-events-none z-40 flex flex-col items-center justify-center">
        
        <!-- Main Menu -->
        <div id="main-menu" class="pointer-events-auto flex flex-col items-center gap-6 p-8 bg-black/60 border-4 border-gray-800 backdrop-blur-sm hidden">
            <h1 class="text-4xl md:text-6xl text-white mb-2 text-glow text-center">SAWBLADES</h1>
            <p class="text-gray-400 text-xs md:text-sm mb-8 animate-pulse">PRESS SPACE OR TAP TO JUMP</p>
            
            <button onclick="startGame()" class="pixel-btn text-xl w-full">PLAY</button>
            <div class="flex gap-4 w-full">
                <button onclick="showShop()" class="pixel-btn text-sm flex-1">SHOP</button>
                <button onclick="showLeaderboard()" class="pixel-btn text-sm flex-1">STATS</button>
            </div>
            <button onclick="showSettings()" class="pixel-btn text-sm w-full mt-2">SETTINGS</button>
        </div>

        <!-- Shop Menu -->
        <div id="shop-menu" class="pointer-events-auto flex flex-col items-center gap-6 p-8 bg-black/90 border-4 border-[#e63946] hidden max-w-lg w-full">
            <h2 class="text-2xl text-[#e63946] text-shadow">GUMBALL MACHINE</h2>
            <div class="flex items-center gap-4 text-yellow-400 text-shadow">
                <span>COINS:</span>
                <span id="shop-coins">0</span>
            </div>
            
            <div class="bg-gray-900 border-2 border-gray-700 p-6 rounded text-center w-full my-4">
                <div class="text-4xl mb-4" id="gumball-display">❓</div>
                <p class="text-xs text-gray-400 leading-relaxed mb-4">Spend 100 coins to roll for a random skin!</p>
                <button onclick="rollGumball()" class="pixel-btn text-sm w-full bg-yellow-600 border-yellow-400 hover:bg-yellow-500 text-black">ROLL (100 <span class="text-yellow-200">©</span>)</button>
            </div>

            <div class="w-full">
                <h3 class="text-sm text-gray-300 mb-2">YOUR SKINS:</h3>
                <div id="inventory-list" class="flex flex-wrap gap-2 text-xs text-gray-500">
                    <!-- Populated via JS -->
                </div>
            </div>

            <button onclick="showMainMenu()" class="pixel-btn text-sm w-full mt-4">BACK</button>
        </div>

        <!-- Death Screen -->
        <div id="death-menu" class="pointer-events-auto flex flex-col items-center gap-6 p-8 bg-red-950/80 border-4 border-red-600 hidden">
            <h2 class="text-4xl text-red-500 text-shadow animate-bounce">WASTED</h2>
            
            <div class="flex flex-col items-center gap-2 text-shadow my-4">
                <div class="text-white">SCORE: <span id="death-score" class="text-blue-400">0</span></div>
                <div class="text-white">COINS EARNED: <span id="death-coins" class="text-yellow-400">0</span></div>
                <div class="text-gray-400 text-xs mt-2">HIGH SCORE: <span id="death-high">0</span></div>
            </div>

            <div class="flex gap-4 w-full">
                <button onclick="startGame()" class="pixel-btn text-sm flex-1">RETRY</button>
                <button onclick="showMainMenu()" class="pixel-btn text-sm flex-1">MENU</button>
            </div>
        </div>
        
        <!-- HUD (Always on when playing) -->
        <div id="hud" class="absolute top-4 left-4 right-4 flex justify-between hidden">
            <div class="text-white text-shadow text-sm md:text-xl">SCORE: <span id="hud-score">0</span></div>
            <div class="text-yellow-400 text-shadow text-sm md:text-xl">COINS: <span id="hud-coins">0</span></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game Constants & Variables
        let width, height, groundY;
        let gameState = 'menu'; // menu, playing, dead, shop
        let frameCount = 0;
        let score = 0;
        let sessionCoins = 0;
        let difficultyMultiplier = 1;
        
        // Save Data handling
        let saveData = {
            inventory: { skins: ['default', 'blue', 'green'], activeSkin: 'default', bgs: ['default'] },
            economy: { coins: 0, gumballCount: 0, wheelCount: 0 },
            stats: { highScore: 0, totalDeaths: 0 }
        };

        const SKINS = {
            'default': '#f8fafc',
            'blue': '#3b82f6',
            'green': '#10b981',
            'gold': '#fbbf24',
            'neon': '#f472b6',
            'glitch': '#a855f7'
        };
        const ALL_SKIN_KEYS = Object.keys(SKINS);

        function loadData() {
            const saved = localStorage.getItem('sawblades_save');
            if(saved) {
                try {
                    const parsed = JSON.parse(saved);
                    // Merge to ensure no missing keys if schema updates
                    saveData.inventory = { ...saveData.inventory, ...parsed.inventory };
                    saveData.economy = { ...saveData.economy, ...parsed.economy };
                    saveData.stats = { ...saveData.stats, ...parsed.stats };
                } catch(e) { console.error("Save corrupted, using defaults"); }
            }
        }
        function saveGame() {
            localStorage.setItem('sawblades_save', JSON.stringify(saveData));
        }

        // DOM Elements
        const elMainMenu = document.getElementById('main-menu');
        const elShopMenu = document.getElementById('shop-menu');
        const elDeathMenu = document.getElementById('death-menu');
        const elHud = document.getElementById('hud');

        // Entities
        let player = {
            x: 100, y: 0, size: 30,
            vy: 0, gravity: 0.6, jumpPower: -12,
            isGrounded: false, color: '#fff'
        };

        let sawblades = [];
        let coins = [];
        let particles = [];
        let floatingTexts = [];
        
        // Background aesthetics
        let stars = [];
        let menuPhantomBlades = []; // Cool background movement for menu
        let gridOffset = 0;

        // --- CORE ENGINE ---

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            groundY = height - Math.max(50, height * 0.1);
            
            // Re-init background arrays for new size
            initBackground();
        }

        function initBackground() {
            stars = [];
            for(let i=0; i<100; i++) {
                stars.push({
                    x: Math.random()*width, 
                    y: Math.random()*height, 
                    size: Math.random()*2+1, 
                    color: `rgba(255,255,255,${Math.random()})`, 
                    speed: Math.random() * 0.5 + 0.1
                });
            }

            menuPhantomBlades = [];
            for(let i=0; i<8; i++) {
                menuPhantomBlades.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: 100 + Math.random() * 200,
                    rotation: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.02,
                    vx: (Math.random() - 0.5) * 1.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    alpha: Math.random() * 0.08 + 0.02
                });
            }
        }

        // --- GAMEPLAY LOGIC ---

        function startGame() {
            gameState = 'playing';
            score = 0;
            sessionCoins = 0;
            frameCount = 0;
            difficultyMultiplier = 1;
            
            player.y = groundY - player.size;
            player.vy = 0;
            player.color = SKINS[saveData.inventory.activeSkin] || '#fff';
            
            sawblades = [];
            coins = [];
            particles = [];
            floatingTexts = [];
            
            hideAllMenus();
            elHud.classList.remove('hidden');
            updateHud();
        }

        function jump() {
            if(gameState === 'playing' && player.isGrounded) {
                player.vy = player.jumpPower;
                player.isGrounded = false;
                spawnParticles(player.x + player.size/2, player.y + player.size, 5, '#555');
            }
        }

        function spawnParticles(x, y, count, color, speed = 2) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * speed * 2,
                    vy: (Math.random() - 0.5) * speed * 2 - 1,
                    life: 1.0,
                    decay: Math.random() * 0.02 + 0.02,
                    color: color,
                    size: Math.random() * 4 + 2
                });
            }
        }

        function spawnFloatingText(x, y, text, color) {
            floatingTexts.push({ x, y, text, color, life: 1.0, vy: -1 });
        }

        function updatePhysics() {
            // Player Y physics
            player.vy += player.gravity;
            player.y += player.vy;

            if(player.y + player.size >= groundY) {
                player.y = groundY - player.size;
                player.vy = 0;
                player.isGrounded = true;
            } else {
                player.isGrounded = false;
            }

            // Difficulty curve
            difficultyMultiplier = 1 + (score / 1000);

            // Spawning Logic
            if(frameCount % Math.max(30, Math.floor(90 / difficultyMultiplier)) === 0) {
                // Spawn Sawblade
                let radius = 20 + Math.random() * 25;
                let speed = (4 + Math.random() * 4) * difficultyMultiplier;
                // Sometimes spawn flying blades
                let yPos = groundY - radius;
                if(Math.random() > 0.7) yPos -= (40 + Math.random() * 80); 

                sawblades.push({
                    x: width + radius,
                    y: yPos,
                    radius: radius,
                    speed: speed,
                    rotation: 0,
                    rotSpeed: speed * 0.05
                });
            }

            if(frameCount % 120 === 0 && Math.random() > 0.3) {
                // Spawn Coin
                let yPos = groundY - 30 - Math.random() * 100;
                coins.push({
                    x: width + 20,
                    y: yPos,
                    radius: 12,
                    speed: 3 + Math.random() * 2
                });
            }

            // Update Entities
            for(let i = sawblades.length - 1; i >= 0; i--) {
                let b = sawblades[i];
                b.x -= b.speed;
                b.rotation -= b.rotSpeed;

                // Collision detection (Circle vs Rect)
                let distX = Math.abs(b.x - (player.x + player.size/2));
                let distY = Math.abs(b.y - (player.y + player.size/2));

                if (distX <= (player.size/2 + b.radius - 5) && distY <= (player.size/2 + b.radius - 5)) {
                    die();
                }

                if(b.x < -b.radius) sawblades.splice(i, 1);
            }

            for(let i = coins.length - 1; i >= 0; i--) {
                let c = coins[i];
                c.x -= c.speed;

                // Collision (Simple distance)
                let dx = c.x - (player.x + player.size/2);
                let dy = c.y - (player.y + player.size/2);
                let dist = Math.sqrt(dx*dx + dy*dy);

                if(dist < c.radius + player.size/2) {
                    sessionCoins++;
                    saveData.economy.coins++;
                    score += 50;
                    spawnParticles(c.x, c.y, 8, '#fbbf24');
                    spawnFloatingText(c.x, c.y, "+1", "#fbbf24");
                    coins.splice(i, 1);
                    updateHud();
                }
                else if(c.x < -c.radius) {
                    coins.splice(i, 1);
                }
            }

            // Update Particles
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= p.decay;
                if(p.life <= 0) particles.splice(i, 1);
            }

            // Update floating texts
            for(let i = floatingTexts.length - 1; i >= 0; i--) {
                let ft = floatingTexts[i];
                ft.y += ft.vy;
                ft.life -= 0.02;
                if(ft.life <= 0) floatingTexts.splice(i, 1);
            }

            score++;
            if(frameCount % 10 === 0) updateHud();
        }

        function die() {
            gameState = 'dead';
            saveData.stats.totalDeaths++;
            if(score > saveData.stats.highScore) {
                saveData.stats.highScore = score;
            }
            saveGame();
            
            spawnParticles(player.x + player.size/2, player.y + player.size/2, 50, '#e63946', 6);
            
            setTimeout(() => {
                elHud.classList.add('hidden');
                document.getElementById('death-score').innerText = score;
                document.getElementById('death-coins').innerText = sessionCoins;
                document.getElementById('death-high').innerText = saveData.stats.highScore;
                elDeathMenu.classList.remove('hidden');
            }, 500);
        }

        // --- DRAWING ---

        function drawSawblade(ctx, x, y, radius, rotation, color = '#e63946', style='normal') {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotation);
            
            ctx.fillStyle = (style === 'phantom') ? color : '#2b2d42';
            ctx.strokeStyle = color;
            ctx.lineWidth = (style === 'phantom') ? 2 : 4;
            
            ctx.beginPath();
            let teeth = 12;
            for(let i=0; i<teeth; i++) {
                let angle = (i / teeth) * Math.PI * 2;
                let nextAngle = ((i + 0.5) / teeth) * Math.PI * 2;
                
                let innerR = radius * 0.7;
                let outerR = radius;

                if(i===0) ctx.moveTo(Math.cos(angle)*innerR, Math.sin(angle)*innerR);
                else ctx.lineTo(Math.cos(angle)*innerR, Math.sin(angle)*innerR);
                
                ctx.lineTo(Math.cos(nextAngle)*outerR, Math.sin(nextAngle)*outerR);
            }
            ctx.closePath();
            
            if(style !== 'phantom') ctx.fill();
            ctx.stroke();

            // Inner hole
            ctx.beginPath();
            ctx.arc(0, 0, radius * 0.2, 0, Math.PI*2);
            ctx.fillStyle = (style === 'phantom') ? 'transparent' : '#050505';
            if(style !== 'phantom') ctx.fill();
            ctx.stroke();
            
            ctx.restore();
        }

        function drawBackground() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, width, height);

            // Stars / Space Dust
            ctx.fillStyle = '#fff';
            stars.forEach(s => {
                s.x -= s.speed * (gameState === 'playing' ? difficultyMultiplier : 0.2);
                if(s.x < 0) s.x = width;
                ctx.globalAlpha = Math.random() > 0.95 ? 0 : 1; // Twinkle
                ctx.fillRect(s.x, s.y, s.size, s.size);
            });
            ctx.globalAlpha = 1.0;

            // --- COOL MENU BACKGROUND MOVEMENT ---
            if(gameState === 'menu' || gameState === 'shop') {
                menuPhantomBlades.forEach(b => {
                    b.x += b.vx;
                    b.y += b.vy;
                    b.rotation += b.rotSpeed;
                    
                    // Wrap around screen
                    if(b.x < -b.radius) b.x = width + b.radius;
                    if(b.x > width + b.radius) b.x = -b.radius;
                    if(b.y < -b.radius) b.y = height + b.radius;
                    if(b.y > height + b.radius) b.y = -b.radius;

                    ctx.globalAlpha = b.alpha;
                    drawSawblade(ctx, b.x, b.y, b.radius, b.rotation, '#e63946', 'phantom');
                });
                ctx.globalAlpha = 1.0;
            }

            // Synthwave Grid on the floor
            ctx.strokeStyle = '#e63946';
            ctx.lineWidth = 1;
            ctx.globalAlpha = 0.3;
            ctx.beginPath();
            
            let gridSpeed = gameState === 'playing' ? 5 * difficultyMultiplier : 1;
            gridOffset = (gridOffset + gridSpeed) % 40;
            
            // Horizontal lines (perspective approximation)
            for(let i = 0; i < 5; i++) {
                let y = groundY + Math.pow(i, 1.5) * 10;
                if(y < height) {
                    ctx.moveTo(0, y);
                    ctx.lineTo(width, y);
                }
            }
            // Vertical lines moving left
            for(let x = -40 + (gridOffset % 40); x < width; x += 40) {
                ctx.moveTo(x, groundY);
                ctx.lineTo(x - 50, height); // slanting left for speed illusion
            }
            ctx.stroke();
            ctx.globalAlpha = 1.0;

            // Ground Line
            ctx.fillStyle = '#e63946';
            ctx.fillRect(0, groundY, width, 4);
        }

        function drawGame() {
            // Draw Player
            if(gameState === 'playing') {
                ctx.fillStyle = player.color;
                // Add a trail or glow if jumping
                if(!player.isGrounded) {
                    ctx.shadowColor = player.color;
                    ctx.shadowBlur = 10;
                }
                ctx.fillRect(player.x, player.y, player.size, player.size);
                ctx.shadowBlur = 0;
                
                // Draw inner details (eyes or visor)
                ctx.fillStyle = '#000';
                ctx.fillRect(player.x + player.size - 10, player.y + 6, 4, 8);
            }

            // Draw Sawblades
            sawblades.forEach(b => drawSawblade(ctx, b.x, b.y, b.radius, b.rotation));

            // Draw Coins
            coins.forEach(c => {
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.radius, 0, Math.PI*2);
                ctx.fillStyle = '#fbbf24'; // Gold
                ctx.fill();
                ctx.strokeStyle = '#fef08a';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // inner detail
                ctx.fillStyle = '#d97706';
                ctx.fillRect(c.x - 2, c.y - 6, 4, 12);
            });

            // Draw Particles
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            ctx.globalAlpha = 1.0;

            // Draw Floating Texts
            ctx.font = '10px "Press Start 2P"';
            ctx.textAlign = 'center';
            floatingTexts.forEach(ft => {
                ctx.fillStyle = ft.color;
                ctx.globalAlpha = ft.life;
                ctx.fillText(ft.text, ft.x, ft.y);
            });
            ctx.globalAlpha = 1.0;
        }

        function loop() {
            drawBackground();
            
            if(gameState === 'playing') {
                updatePhysics();
            }
            
            drawGame();
            frameCount++;
            requestAnimationFrame(loop);
        }

        // --- UI & MENUS ---

        function hideAllMenus() {
            elMainMenu.classList.add('hidden');
            elShopMenu.classList.add('hidden');
            elDeathMenu.classList.add('hidden');
            elHud.classList.add('hidden');
        }

        function showMainMenu() {
            gameState = 'menu';
            hideAllMenus();
            elMainMenu.classList.remove('hidden');
        }

        function showShop() {
            gameState = 'shop';
            hideAllMenus();
            document.getElementById('shop-coins').innerText = saveData.economy.coins;
            renderInventory();
            elShopMenu.classList.remove('hidden');
        }

        function showLeaderboard() {
            alert(`STATS\nHigh Score: ${saveData.stats.highScore}\nTotal Deaths: ${saveData.stats.totalDeaths}`);
        }

        function showSettings() {
            alert("Settings: W.I.P.\nAudio controls coming soon!");
        }

        function updateHud() {
            document.getElementById('hud-score').innerText = score;
            document.getElementById('hud-coins').innerText = sessionCoins;
        }

        // --- SHOP & INVENTORY LOGIC ---

        function renderInventory() {
            const list = document.getElementById('inventory-list');
            list.innerHTML = '';
            
            saveData.inventory.skins.forEach(skin => {
                const btn = document.createElement('button');
                btn.innerText = skin.toUpperCase();
                btn.className = `p-2 border-2 ${saveData.inventory.activeSkin === skin ? 'border-green-400 bg-green-900/50 text-white' : 'border-gray-600 bg-gray-800 hover:bg-gray-700'}`;
                btn.style.color = SKINS[skin];
                btn.onclick = () => {
                    saveData.inventory.activeSkin = skin;
                    saveGame();
                    renderInventory();
                };
                list.appendChild(btn);
            });
        }

        function rollGumball() {
            const cost = 100;
            if(saveData.economy.coins < cost) {
                document.getElementById('gumball-display').innerText = "NOT ENOUGH COINS!";
                setTimeout(() => document.getElementById('gumball-display').innerText = "❓", 1500);
                return;
            }

            // Deduct
            saveData.economy.coins -= cost;
            saveData.economy.gumballCount++;
            document.getElementById('shop-coins').innerText = saveData.economy.coins;

            // Determine unowned skins
            let unowned = ALL_SKIN_KEYS.filter(k => !saveData.inventory.skins.includes(k));
            
            document.getElementById('gumball-display').classList.add('animate-spin');
            
            setTimeout(() => {
                document.getElementById('gumball-display').classList.remove('animate-spin');
                if(unowned.length === 0) {
                    // Refund or give consolation prize
                    saveData.economy.coins += 50;
                    document.getElementById('gumball-display').innerText = "DUPLICATE! +50©";
                } else {
                    // Unlock random
                    let newSkin = unowned[Math.floor(Math.random() * unowned.length)];
                    saveData.inventory.skins.push(newSkin);
                    saveData.inventory.activeSkin = newSkin;
                    document.getElementById('gumball-display').innerHTML = `<span style="color:${SKINS[newSkin]}">${newSkin.toUpperCase()} UNLOCKED!</span>`;
                }
                saveGame();
                renderInventory();
                setTimeout(() => document.getElementById('gumball-display').innerText = "❓", 2000);
            }, 1000);
        }

        // --- INPUTS ---
        
        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                if(gameState === 'menu' || gameState === 'dead') startGame();
                else jump();
            }
        });

        window.addEventListener('touchstart', (e) => {
            if(e.target.tagName !== 'BUTTON') { // Avoid double triggering if hitting a UI button
                if(gameState === 'menu' || gameState === 'dead') startGame();
                else jump();
            }
        });
        
        window.addEventListener('mousedown', (e) => {
            if(e.target === canvas) {
                jump();
            }
        });

        // --- INITIALIZATION ---
        
        window.onload = function() {
            loadData();
            window.addEventListener('resize', resize);
            resize(); // Initial sizing & bg setup
            showMainMenu();
            requestAnimationFrame(loop);
        }

        // Exposed globals for inline HTML onClick handlers
        window.startGame = startGame;
        window.showMainMenu = showMainMenu;
        window.showShop = showShop;
        window.showLeaderboard = showLeaderboard;
        window.showSettings = showSettings;
        window.rollGumball = rollGumball;

    </script>
</body>
</html>
